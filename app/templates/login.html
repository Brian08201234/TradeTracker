{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-xl animate-fadeInUp">
            <div class="card-header bg-transparent text-center border-0 pt-5 pb-3">
                <div class="mb-3">
                    <i class="fas fa-chart-line fa-4x" style="color: #6366f1;"></i>
                </div>
                <h2 class="fw-bold mb-1">Welcome Back</h2>
                <p class="text-secondary">Sign in to your trading account</p>
            </div>
            <div class="card-body px-5 pb-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-user me-2"></i>Username
                        </label>
                        <input type="text" class="form-control form-control-lg" name="username" 
                               placeholder="Enter your username" required autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input type="password" class="form-control form-control-lg" name="password" 
                               placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                    
                    <div class="text-center">
                        <p class="text-secondary mb-0">
                            Don't have an account? 
                            <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-bold">
                                Create one now
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
