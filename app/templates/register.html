{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-xl animate-fadeInUp">
            <div class="card-header bg-transparent text-center border-0 pt-5 pb-3">
                <div class="mb-3">
                    <i class="fas fa-user-plus fa-4x" style="color: #10b981;"></i>
                </div>
                <h2 class="fw-bold mb-1">Create Account</h2>
                <p class="text-secondary">Start your trading journey today</p>
            </div>
            <div class="card-body px-5 pb-5">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-user me-2"></i>Username
                        </label>
                        <input type="text" class="form-control form-control-lg" name="username" 
                               placeholder="Choose a username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email
                        </label>
                        <input type="email" class="form-control form-control-lg" name="email" 
                               placeholder="Enter your email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input type="password" class="form-control form-control-lg" name="password" 
                               placeholder="At least 6 characters" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="fas fa-lock me-2"></i>Confirm Password
                        </label>
                        <input type="password" class="form-control form-control-lg" name="confirm_password" 
                               placeholder="Confirm your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 mb-4">
                        <i class="fas fa-check-circle me-2"></i>Create Account
                    </button>
                    
                    <div class="text-center">
                        <p class="text-secondary mb-0">
                            Already have an account? 
                            <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-bold">
                                Sign in here
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
